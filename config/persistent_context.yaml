# Persistent context for LLM prompt generation
# Edit this file to customize your investment strategy and constraints

investment_strategy: >
  Growth-oriented real brokerage strategy focused on momentum stocks and
  sector rotation. Seeking to outperform the S&P 500 benchmark over a
  3-month horizon using a portfolio of distributed positions.

risk_tolerance: "Moderate"

investment_horizon: "3 months"

constraints:
  - "No single position > 10% of portfolio"
  - "Keep 5-15% cash reserve"
  - "No options"

rules:
  - "Take profits when unrealized gain exceeds 50%"
  - "Cut losses at -20% from entry"
  - "Always document rationale before entering a trade"
  - "Review portfolio every evening"
  - "Consider sector concentration before adding new positions"

benchmark: "SPY"

notes: >
  Use this information to make disciplined decisions for a real brokerage
  portfolio. Make only recommendations that fit the hard constraints above.
  If no change is recommended clearly, the default action is to hold the
  portfolio unchanged for tomorrow.
